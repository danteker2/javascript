<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Считать ворон</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Считать ворон</h1>
    
    <form id="crowsForm">
        <div class="form-group">
            <label for="num">Количество ворон:</label>
            <input type="number" id="num" name="num" min="0" required>
        </div>
        
        <button type="submit">Считать</button>
    </form>

    <script>
        'use strict';

        function getCrowEnding(num) {
            const lastDigit = num % 10;
            const lastTwoDigits = num % 100;
            
            if (lastDigit === 1 && lastTwoDigits !== 11) {
                return 'ворона';
            } else if (lastDigit >= 2 && lastDigit <= 4 && (lastTwoDigits < 12 || lastTwoDigits > 14)) {
                return 'вороны';
            } else {
                return 'ворон';
            }
        }

        document.getElementById('crowsForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const num = parseInt(document.getElementById('num').value);
            const ending = getCrowEnding(num);
            
            alert(`На ветке сидит ${num} ${ending}`);
        });
    </script>
</body>
</html>
