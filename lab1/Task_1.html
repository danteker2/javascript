<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пенсионный калькулятор</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .radio-group {
            margin: 10px 0;
        }
        .radio-group label {
            display: inline;
            margin-right: 20px;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        textarea {
            width: 100%;
            height: 100px;
            margin-top: 15px;
            padding: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <h1>Пенсионный калькулятор</h1>
    
    <form id="pensionForm">
        <div class="form-group">
            <label for="age">Возраст:</label>
            <input type="number" id="age" name="age" min="0" required>
        </div>
        
        <div class="form-group">
            <label>Пол:</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="gender" value="male" required>
                    Мужской
                </label>
                <label>
                    <input type="radio" name="gender" value="female" required>
                    Женский
                </label>
            </div>
        </div>
        
        <button type="submit">Рассчитать</button>
    </form>
    
    <textarea id="result" readonly placeholder="Результат появится здесь..."></textarea>

    <script>
        'use strict';

        document.getElementById('pensionForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const age = parseInt(document.getElementById('age').value);
            const gender = document.querySelector('input[name="gender"]:checked').value;
            const resultArea = document.getElementById('result');
            let message = '';

            if (age >= 0 && age <= 17) {
                message = 'Вам работать ещё рано — учитесь';
            } else if ((gender === 'male' && age >= 18 && age <= 59) || 
                       (gender === 'female' && age >= 18 && age <= 54)) {
                message = 'Вам ещё работать и работать';
            } else if ((gender === 'male' && age >= 60 && age <= 64) || 
                       (gender === 'female' && age >= 55 && age <= 59)) {
                message = 'Скоро пенсия!';
            } else if ((gender === 'male' && age >= 65) || 
                       (gender === 'female' && age >= 60)) {
                message = 'Вам пора на пенсию';
            } else {
                message = 'Да кто ты такой?';
            }

            resultArea.value = message;
        });
    </script>
</body>
</html>
