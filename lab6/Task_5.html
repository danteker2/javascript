<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест showPrompt</title>
  <style>
    /* Немного стилей для красоты самой страницы */
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f0f0;
      margin: 0;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
    }
    button:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>

  <button onclick="runTest()">Нажми меня, чтобы вызвать showPrompt</button>

  <script>
    /**
     * Отображает модальное диалоговое окно с сообщением, полем ввода и кнопками "OK" / "ОТМЕНА".
     * 
     * @param {string} html - HTML-разметка сообщения для отображения в диалоговом окне.
     * @param {function} callback - Функция обратного вызова, которая будет вызвана после завершения ввода.
     *                              Принимает один аргумент: введенное пользователем значение (string) 
     *                              или null, если ввод был отменен.
     * 
     * @example
     * showPrompt("Введите что-нибудь<br>... умное:)", function(value) {
     *   if (value === null) {
     *     console.log("Ввод отменен");
     *   } else {
     *     alert("Вы ввели: " + value);
     *   }
     * });
    */
    function showPrompt(html, callback) {
	  // 1. Создаем затемненный фон (backdrop), блокирующий взаимодействие со страницей
      const backdrop = document.createElement('div');
      backdrop.style.cssText = `position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 10000; display: flex; justify-content: center; align-items: center;`;
      
	  // 2. Создаем само модальное окно
      const modal = document.createElement('div');
      modal.style.cssText = `background: white; padding: 24px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25); min-width: 320px; max-width: 90%; display: flex; flex-direction: column; gap: 16px;`;
      modal.setAttribute('role', 'dialog');
      modal.setAttribute('aria-modal', 'true');
      
	  // 3. Создаем элементы формы
      const message = document.createElement('div');
      message.innerHTML = html; // Вставляем переданный HTML

      const input = document.createElement('input');
      input.type = 'text';
      input.style.cssText = `padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; outline: none;`;
      input.addEventListener('focus', () => input.style.borderColor = '#007bff');
      input.addEventListener('blur', () => input.style.borderColor = '#ccc');

      const buttonsContainer = document.createElement('div');
      buttonsContainer.style.cssText = `display: flex; justify-content: flex-end; gap: 12px;`;

      const okBtn = document.createElement('button');
      okBtn.textContent = 'OK';
      okBtn.style.cssText = `padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer;`;
      
      const cancelBtn = document.createElement('button');
      cancelBtn.textContent = 'ОТМЕНА';
      cancelBtn.style.cssText = `padding: 10px 20px; background: #6c757d; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer;`;
      
	  // Собираем форму
      buttonsContainer.appendChild(okBtn);
      buttonsContainer.appendChild(cancelBtn);
      modal.appendChild(message);
      modal.appendChild(input);
      modal.appendChild(buttonsContainer);
      backdrop.appendChild(modal);
      document.body.appendChild(backdrop);
	  
      // 4. Ловушка фокуса (Focus Trap)
      const focusableElements = modal.querySelectorAll('input, button');
      const firstFocusable = focusableElements[0];
      const lastFocusable = focusableElements[focusableElements.length - 1];
      
	  // Устанавливаем начальный фокус на поле ввода
      input.focus();
	  
      // Функция закрытия диалога
      function close() {
        document.body.removeChild(backdrop);
        document.removeEventListener('keydown', handleGlobalKeydown);
      }
	  
      // Глобальный обработчик клавиш для Escape и ловушки Tab
      function handleGlobalKeydown(e) {
        if (e.key === 'Escape') {
          e.preventDefault();
          callback(null);
          close();
        } else if (e.key === 'Tab') {
		  // Ловушка фокуса: не даем фокусу выйти за пределы модального окна
          if (e.shiftKey) {
		    // Shift + Tab
            if (document.activeElement === firstFocusable) {
              e.preventDefault();
              lastFocusable.focus();
            }
          } else {
		    // Tab
            if (document.activeElement === lastFocusable) {
              e.preventDefault();
              firstFocusable.focus();
            }
          }
        }
      }

      document.addEventListener('keydown', handleGlobalKeydown);
	  
      // 5. Обработчики событий элементов формы
      okBtn.addEventListener('click', () => { callback(input.value); close(); });
      cancelBtn.addEventListener('click', () => { callback(null); close(); });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          callback(input.value);
          close();
        }
      });
    }

    // Функция для запуска по кнопке
    function runTest() {
      showPrompt("Введите что-нибудь<br>... умное:)", function(value) {
        if (value === null) {
          alert("Действие отменено пользователем.");
        } else {
          alert("Вы ввели: " + value);
        }
      });
    }
  </script>
</body>
</html>
