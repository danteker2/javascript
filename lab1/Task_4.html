<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простые числа</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f5f5f5;
            border-radius: 5px;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <h1>Простые числа</h1>
    
    <form id="primeForm">
        <div class="form-group">
            <label for="n">Введите число n:</label>
            <input type="number" id="n" name="n" min="2" required>
        </div>
        
        <button type="submit">Найти простые числа</button>
    </form>
    
    <div id="result"></div>

    <script>
        'use strict';

        function isPrime(num) {
            if (num < 2) {
                return false;
            }
            
            for (let i = 2; i <= Math.sqrt(num); i++) {
                if (num % i === 0) {
                    return false;
                }
            }
            
            return true;
        }

        document.getElementById('primeForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const n = parseInt(document.getElementById('n').value);
            const primes = [];
            
            for (let i = 2; i <= n; i++) {
                if (isPrime(i)) {
                    primes.push(i);
                }
            }
            
            document.getElementById('result').innerHTML = 
                '<strong>Простые числа от 2 до ' + n + ':</strong><br>' + 
                primes.join(', ');
        });
    </script>
</body>
</html>
